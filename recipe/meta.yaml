{% set name = "ispc" %}
{% set version = "1.27.0" %}
{% set llvm_version = "13" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ispc/ispc/archive/refs/tags/v1.17.0.zip
  sha256: 3ba60417b8512058e4422fa4a07cd0432622421c33570f6b68f19cf02eea3a7b
  patches:
    - skip_32.diff

build:
  number: 0
  skip: true  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - python *
    - cmake
    - make      # [unix]
    - flex      # [unix]
    - bison     # [unix]
    - m2-flex   # [win]
    - m2-bison  # [win]
    - m2-m4     # [win]
    - clang     {{ llvm_version }}.*  # [unix]
    - clangxx   {{ llvm_version }}.*  # [unix]
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
  host:
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
    - llvm      {{ llvm_version }}.*
    - ncurses   # [unix]
    - zlib

test:
  commands:
    - ispc --help

about:
  home: https://ispc.github.io/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: 'Intel SPMD Program Compiler'
  doc_url: https://ispc.github.io/documentation.html
  dev_url: https://github.com/ispc/ispc

extra:
  recipe-maintainers:
    - isuruf
