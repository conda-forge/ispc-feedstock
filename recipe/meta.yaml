{% set name = "ispc" %}
{% set version = "1.25.3" %}
{% set llvm_version = "18" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ispc/ispc/archive/refs/tags/v1.25.3.tar.gz
  sha256: 6f00038e0e86e90474f3117c3b393f6695a8fbe1b3d8fe3b1a0baf197dfb7557

build:
  number: 0
  skip: True  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - python *
    - cmake
    - make      # [unix]
    - flex      # [unix]
    - bison     # [unix]
    - m2-flex   # [win]
    - m2-bison  # [win]
    - m2-m4     # [win]
    - clang     {{ llvm_version }}.*  # [unix]
    - clangxx   {{ llvm_version }}.*  # [unix]
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
  host:
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
    - llvm      {{ llvm_version }}.*
    - ncurses   # [unix]
    - zlib

test:
  commands:
    - ispc --help

about:
  home: https://ispc.github.io/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: 'Intel SPMD Program Compiler'
  doc_url: https://ispc.github.io/documentation.html
  dev_url: https://github.com/ispc/ispc

extra:
  recipe-maintainers:
    - isuruf
